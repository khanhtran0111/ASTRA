name: Hackathon — Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Docker image tag (default: 12-char SHA of HEAD)'
        required: false
        default: ''

concurrency:
  group: hackathon-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  # AWS_REGION and EC2_USER have sensible defaults so teams don't need to set them.
  AWS_REGION:     ${{ vars.AWS_REGION     || 'ap-southeast-1' }}
  ECR_REGISTRY:   ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  # ── 1. Compute a stable tag once; pass it to downstream jobs ─────────────
  prepare:
    name: Compute release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Resolve image tag
        id: tag
        run: |
          INPUT="${{ github.event.inputs.tag }}"
          SHA="${GITHUB_SHA::12}"
          echo "value=${INPUT:-$SHA}" >> "$GITHUB_OUTPUT"

  # ── 2. Ensure ECR repository exists ──────────────────────────────────────
  ensure-ecr:
    name: Ensure ECR repository exists
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@6.1.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names "$ECR_REPOSITORY" \
            --region "$AWS_REGION" 2>/dev/null \
          || aws ecr create-repository \
            --repository-name "$ECR_REPOSITORY" \
            --region "$AWS_REGION" \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

  # ── 3. Build server and web images in parallel ───────────────────────────
  build:
    name: Build & push seta-${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: [prepare, ensure-ecr]
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - service:    server
            dockerfile: infra/docker/server.Dockerfile
          - service:    web
            dockerfile: infra/docker/web.Dockerfile

    steps:
      - uses: actions/checkout@v6.0.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@6.1.3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2.1.5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Build & push seta-${{ matrix.service }}
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file:      ${{ matrix.dockerfile }}
          platforms: linux/amd64
          push:      true
          provenance: false
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-${{ needs.prepare.outputs.tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-latest
          cache-from: |
            type=gha,scope=${{ matrix.service }}
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-buildcache
          cache-to: |
            type=gha,mode=max,scope=${{ matrix.service }}
            type=registry,ref=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ matrix.service }}-buildcache,mode=max

  # ── 4. Deploy only after both images are confirmed in ECR ─────────────────
  deploy:
    name: Deploy ${{ needs.prepare.outputs.tag }} to EC2
    runs-on: ubuntu-latest
    needs: [prepare, build]
    timeout-minutes: 30
    environment: production

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.5
        env:
          ECR_REGISTRY:          ${{ env.ECR_REGISTRY }}
          ECR_REPOSITORY:        ${{ env.ECR_REPOSITORY }}
          IMAGE_TAG:             ${{ needs.prepare.outputs.tag }}
          AWS_REGION:            ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ECR_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_ECR_SECRET_ACCESS_KEY }}
          APP_DOMAIN:            ${{ vars.APP_DOMAIN }}
          OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
          EMBED_MODEL:           ${{ vars.EMBED_MODEL || 'openai/text-embedding-3-small' }}
          AGENT_MODELS:          ${{ vars.AGENT_MODELS || 'openai/gpt-4o:balanced' }}
          AGENT_MODEL_DEFAULT:   ${{ vars.AGENT_MODEL_DEFAULT || 'auto' }}
          # ACME_EMAIL is optional — falls back to organizer address for cert notifications.
          ACME_EMAIL:            ${{ vars.ACME_EMAIL || 'devops@seta-international.vn' }}
          # Passed to EC2 so compose.yml / Traefik configs are fetched from the fork's own
          # branch, not the upstream, so local infra changes are picked up on deploy.
          GITHUB_REPO:           ${{ github.repository }}
          GITHUB_REF_NAME:       ${{ github.ref_name }}
        with:
          host:            ${{ vars.EC2_HOST }}
          username:        ${{ vars.EC2_USER || 'ubuntu' }}
          key:             ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          command_timeout: 25m
          envs:            ECR_REGISTRY,ECR_REPOSITORY,IMAGE_TAG,AWS_REGION,AWS_ACCESS_KEY_ID,AWS_SECRET_ACCESS_KEY,APP_DOMAIN,OPENAI_API_KEY,EMBED_MODEL,AGENT_MODELS,AGENT_MODEL_DEFAULT,ACME_EMAIL,GITHUB_REPO,GITHUB_REF_NAME
          script: |
            set -euo pipefail
            echo "=== Deploying $GITHUB_REPO@$GITHUB_REF_NAME tag=$IMAGE_TAG ==="

            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # ── Persistent secrets ────────────────────────────────────────────────
            # POSTGRES_PASSWORD, BETTER_AUTH_SECRET, and CRYPTO_LOCAL_MASTER_KEY are
            # generated once on first deploy and stored on the EC2 so they survive
            # redeployments without needing to be kept in GitHub Secrets.
            # If this EC2 is ever replaced, delete secrets.env first so fresh secrets
            # are generated and the database is re-initialised cleanly.
            SECRETS_FILE=/opt/seta/secrets.env
            sudo mkdir -p /opt/seta
            if [ ! -f "$SECRETS_FILE" ]; then
              echo "=== First deploy: generating persistent app secrets ==="
              printf 'POSTGRES_PASSWORD=%s\nBETTER_AUTH_SECRET=%s\nCRYPTO_LOCAL_MASTER_KEY=%s\n' \
                "$(openssl rand -hex 16)" \
                "$(openssl rand -hex 32)" \
                "$(openssl rand -hex 32)" \
                | sudo tee "$SECRETS_FILE" > /dev/null
              sudo chmod 600 "$SECRETS_FILE"
            fi
            sudo chown "$(id -u):$(id -g)" "$SECRETS_FILE"
            # shellcheck source=/dev/null
            source "$SECRETS_FILE"

            SERVER_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:server-$IMAGE_TAG"
            WEB_IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY:web-$IMAGE_TAG"

            # Write runtime config.
            # ECR_REGISTRY and ECR_REPOSITORY are included so compose.yml fallback
            # expressions (worker, migrator, seeder) resolve correctly if
            # PLATFORM_IMAGE_SERVER is ever unset.
            sudo tee /opt/seta/.env > /dev/null <<EOF
            NODE_ENV=production
            PLATFORM_IMAGE_SERVER=$SERVER_IMAGE
            PLATFORM_IMAGE_WEB=$WEB_IMAGE
            PLATFORM_VERSION=$IMAGE_TAG
            PLATFORM_MODULES=*
            PLATFORM_DOMAIN=$APP_DOMAIN
            PLATFORM_ACME_EMAIL=$ACME_EMAIL
            PLATFORM_TLS_MODE=letsencrypt
            ECR_REGISTRY=$ECR_REGISTRY
            ECR_REPOSITORY=$ECR_REPOSITORY
            DATABASE_URL=postgres://seta:${POSTGRES_PASSWORD}@postgres:5432/seta
            POSTGRES_USER=seta
            POSTGRES_PASSWORD=$POSTGRES_PASSWORD
            POSTGRES_DB=seta
            PORT=3000
            PUBLIC_URL=https://$APP_DOMAIN
            BETTER_AUTH_SECRET=$BETTER_AUTH_SECRET
            SESSION_COOKIE_SAMESITE=strict
            CORS_ORIGINS=https://$APP_DOMAIN
            OPENAI_API_KEY=$OPENAI_API_KEY
            EMBED_MODEL=${EMBED_MODEL:-openai/text-embedding-3-small}
            AGENT_MODELS=${AGENT_MODELS:-openai/gpt-4o:balanced}
            AGENT_MODEL_DEFAULT=${AGENT_MODEL_DEFAULT:-auto}
            CRYPTO_KEY_PROVIDER=env
            CRYPTO_LOCAL_MASTER_KEY=$CRYPTO_LOCAL_MASTER_KEY
            EVENTS_RETENTION_DAYS=30
            DLQ_ALERT_THRESHOLD=100
            KNOWLEDGE_AV_REQUIRED=false
            MAILER_DEFAULT_TRANSPORT=dev-stub
            MAILER_DEFAULT_SENDER=noreply@$APP_DOMAIN
            EOF
            sudo chown "$(id -u):$(id -g)" /opt/seta/.env
            chmod 600 /opt/seta/.env

            echo "=== Runtime model env ==="
            grep '^AGENT_MODELS=' /opt/seta/.env || true
            grep '^AGENT_MODEL_DEFAULT=' /opt/seta/.env || true

            sudo mkdir -p /opt/platform
            sudo chown -R "$(id -u):$(id -g)" /opt/platform
            cd /opt/platform

            # Fetch compose and Traefik config from this fork's own branch so that
            # infrastructure changes committed to the fork are picked up on deploy.
            REPO_RAW="https://raw.githubusercontent.com/$GITHUB_REPO/$GITHUB_REF_NAME"
            curl -fsSL "$REPO_RAW/compose.yml" -o compose.yml

            mkdir -p infra/traefik/dynamic
            curl -fsSL "$REPO_RAW/infra/traefik/traefik.yml"        -o infra/traefik/traefik.yml
            curl -fsSL "$REPO_RAW/infra/traefik/dynamic/routes.yml" -o infra/traefik/dynamic/routes.yml
            sed -i "s/DOMAIN_PLACEHOLDER/$APP_DOMAIN/g" infra/traefik/dynamic/routes.yml

            # First-run guard: disable host nginx so Traefik can own ports 80/443.
            if systemctl is-active --quiet nginx; then
              sudo systemctl stop nginx
              sudo systemctl disable nginx
            fi

            # 1. Stop app containers to free memory before pulling.
            #    The 4 GB host cannot hold old + new server/worker images concurrently
            #    with the running stack — pulling while running causes OOM.
            echo "=== Stopping app containers ==="
            docker compose --env-file /opt/seta/.env stop server worker web 2>/dev/null || true
            docker compose --env-file /opt/seta/.env rm -f server worker web 2>/dev/null || true

            # 2. Prune old tagged images for this ECR repository before pulling.
            #    Targeted removal is more reliable than --filter "until=24h", which
            #    reclaims nothing when deploys are < 24h apart.
            echo "=== Pruning old images ==="
            docker images --format '{{.Repository}}:{{.Tag}}' \
              | grep "^$ECR_REGISTRY/$ECR_REPOSITORY:" \
              | grep -v ":server-$IMAGE_TAG" \
              | grep -v ":web-$IMAGE_TAG" \
              | grep -v ":server-latest" \
              | grep -v ":web-latest" \
              | grep -v "buildcache" \
              | xargs docker rmi --force 2>/dev/null || true

            # 3. Pull fresh images.
            echo "=== Pulling images ==="
            docker compose --env-file /opt/seta/.env pull server web worker

            # 4. Run migrations BEFORE starting app containers so the server
            #    never boots against a schema that is behind.
            echo "=== Running migrations ==="
            docker compose --env-file /opt/seta/.env run --rm migrator

            # 5. Start app containers and wait until every healthcheck passes.
            echo "=== Starting stack ==="
            set +e
            docker compose --env-file /opt/seta/.env up -d \
              --remove-orphans --wait --wait-timeout 180 \
              proxy server web worker
            STATUS=$?
            set -e

            if [ "$STATUS" -ne 0 ]; then
              echo "=== docker compose ps ==="
              docker compose --env-file /opt/seta/.env ps || true

              echo "=== server logs ==="
              docker logs --tail=200 seta-server-1 2>&1 || true

              echo "=== server health inspect ==="
              docker inspect seta-server-1 --format='{{range .State.Health.Log}}{{println "----"}}{{println .End}}{{println "ExitCode:" .ExitCode}}{{println .Output}}{{end}}' 2>&1 || true

              echo "=== server runtime model env ==="
              docker inspect seta-server-1 --format '{{range .Config.Env}}{{println .}}{{end}}' \
                | grep -E '^AGENT_MODEL|^AGENT_MODELS' || true

              exit "$STATUS"
            fi

            # 6. Smoke-test: verify the public /health/ready endpoint responds 200.
            #    /api/health requires auth — /health/ready is the unauthenticated probe.
            echo "=== Smoke test: https://$APP_DOMAIN/health/ready ==="
            code=000
            for i in $(seq 1 12); do
              code=$(curl -s -o /dev/null -w "%{http_code}" \
                --max-time 5 "https://$APP_DOMAIN/health/ready" || true)
              [ "$code" = "200" ] && break
              echo "  attempt $i/12: HTTP $code — retrying in 5s…"
              sleep 5
            done
            [ "$code" = "200" ] \
              || { echo "❌ Smoke test failed (last HTTP status: $code)"; exit 1; }
            echo "✅ Smoke test passed"

            echo "=== Deploy complete: $IMAGE_TAG ==="

      - name: Job summary
        if: success()
        env:
          IMAGE_TAG:  ${{ needs.prepare.outputs.tag }}
          APP_DOMAIN: ${{ vars.APP_DOMAIN }}
        run: |
          {
            echo "## Deploy complete :rocket:"
            echo ""
            echo "| | |"
            echo "|-|-|"
            echo "| **Tag** | \`${IMAGE_TAG}\` |"
            echo "| **URL** | https://${APP_DOMAIN} |"
          } >> "$GITHUB_STEP_SUMMARY"